version: '3.8'

services:

  mariadb:
    image: mariadb:11
    container_name: school-mariadb
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school
      MYSQL_USER: school
      MYSQL_PASSWORD: school123

    ports:
      - "3306:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: